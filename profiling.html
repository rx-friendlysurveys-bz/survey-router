<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Survey Profiling</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <h1>Survey Profiling</h1>
  <form id="profilingForm">
    <p>Which type of grocery do you usually purchase?</p>
    <label><input type="radio" name="grocery" value="fresh"> Fresh Produce</label><br>
    <label><input type="radio" name="grocery" value="packaged"> Packaged Products</label><br>
    <label><input type="radio" name="grocery" value="other"> Other</label><br><br>

    <p>Which category best describes your shopping?</p>
    <label><input type="radio" name="category" value="air"> Air Travel Related</label><br>
    <label><input type="radio" name="category" value="traffic"> Traffic/Transport</label><br>
    <label><input type="radio" name="category" value="general"> General Household</label><br><br>

    <button type="submit">Continue</button>
  </form>

  <script src="routing.js"></script>
</body>
</html>
